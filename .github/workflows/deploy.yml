name: Deploy to VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: production-deployment
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://www.mbfdhub.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST 'bash -s' << 'EOF'
            set -e
            cd /root/mbfd-hub
            
            # Create backup before deploy
            BACKUP_FILE="backups/mbfd_hub_$(date +%Y%m%d_%H%M%S).sql"
            mkdir -p backups
            docker compose -f compose.yaml exec -T pgsql pg_dump -U mbfd_user mbfd_hub > "$BACKUP_FILE"
            echo "✓ Backup created: $BACKUP_FILE"
            
            # Pull latest changes and reset to origin (deterministic deploy)
            echo "=== Git Diagnostics ==="
            git remote -v
            git remote set-url origin https://${{ secrets.GH_PAT }}@github.com/pdarleyjr/mbfd-hub.git
            echo "Remote URL updated with auth token"
            git fetch origin --force --prune
            echo "Fetched. origin/main is: $(git rev-parse origin/main)"
            echo "Current HEAD before reset: $(git rev-parse HEAD)"
            git reset --hard origin/main
            echo "HEAD after reset: $(git rev-parse HEAD)"
            git clean -fd
            # Write deploy marker file (verifiable via HTTP)
            echo "{\"deployed_sha\":\"$(git rev-parse HEAD)\",\"deployed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > public/deploy-marker.json
            # Verify SHA matches what GitHub expects
            VPS_SHA=$(git rev-parse HEAD)
            echo "VPS SHA: $VPS_SHA"
            echo "=== End Git Diagnostics ==="
            echo "✓ Repository reset to origin/main (pdarleyjr/mbfd-hub)"
            
            # Rebuild and restart containers (explicit compose file to avoid duplicate warnings)
            docker compose -f compose.yaml up -d --build
            echo "✓ Containers rebuilt and restarted"
            
            # Wait for containers to be healthy
            sleep 15
            
            # Verify Reverb is running after container restart
            docker compose -f compose.yaml exec -T laravel.test bash -c 'pgrep -f "reverb:start" || (echo "Reverb not running, starting..." && nohup php /var/www/html/artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction > /tmp/reverb.log 2>&1 &)'
            echo "✓ Reverb verified"
            
            # Verify queue worker
            docker compose -f compose.yaml exec -T laravel.test bash -c 'pgrep -f "queue:work" || (echo "Queue worker not running, starting..." && nohup php /var/www/html/artisan queue:work --sleep=3 --tries=3 --max-time=3600 > /tmp/queue-worker.log 2>&1 &)'
            echo "✓ Queue worker verified"
            
            # Run Laravel commands
            docker compose -f compose.yaml exec -T laravel.test php artisan migrate --force
            docker compose -f compose.yaml exec -T laravel.test php artisan optimize:clear
            docker compose -f compose.yaml exec -T laravel.test php artisan config:cache
            docker compose -f compose.yaml exec -T laravel.test php artisan route:cache
            docker compose -f compose.yaml exec -T laravel.test php artisan view:cache || echo "view:cache failed — clearing views instead" && docker compose -f compose.yaml exec -T laravel.test php artisan view:clear
            docker compose -f compose.yaml exec -T laravel.test php artisan filament:clear-cached-components
            echo "✓ Laravel optimizations complete"
            
            # Build main Vite assets (CSS theme + JS)
            docker compose -f compose.yaml exec -T laravel.test npm ci
            docker compose -f compose.yaml exec -T laravel.test npm run build
            echo "✓ Main Vite assets built"
            
            # Publish Filament assets
            docker compose -f compose.yaml exec -T laravel.test php artisan filament:assets
            echo "✓ Filament assets published"
            
            # Build daily-checkout frontend INSIDE container (not on host)
            docker compose -f compose.yaml exec -T laravel.test bash -c 'cd /var/www/html/resources/js/daily-checkout && npm ci && npm run build'
            # Copy built assets to public
            docker compose -f compose.yaml exec -T laravel.test bash -c 'cp -r /var/www/html/resources/js/daily-checkout/dist/* /var/www/html/public/daily/ 2>/dev/null || true'
            echo "✓ Daily-checkout frontend built"
          EOF

      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'cloudflare-worker'
          command: deploy

      - name: Purge Cloudflare Cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://www.mbfdhub.com/","https://www.mbfdhub.com/manifest.json","https://www.mbfdhub.com/site.webmanifest","https://www.mbfdhub.com/daily/index.html","https://www.mbfdhub.com/daily/","https://www.mbfdhub.com/__version","https://mbfdhub.com/","https://mbfdhub.com/daily/index.html","https://mbfdhub.com/daily/","https://mbfdhub.com/__version"]}'
          echo "✓ Cloudflare cache purged"

      - name: Run Smoke Tests
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          echo "Running smoke tests..."
          sleep 5
          
          # Test version endpoint (follow redirects with -L)
          if curl -sfL https://www.mbfdhub.com/__version | jq .; then
            echo "✓ Version endpoint check passed"
          else
            echo "⚠ Version endpoint check failed"
          fi
          
          # Test daily checkout page (follow redirects with -L)
          if curl -sfL https://www.mbfdhub.com/daily/ -o /dev/null; then
            echo "✓ Daily checkout accessible"
          else
            echo "⚠ Daily checkout check failed"
          fi

      - name: Verify Service Workers
        run: |
          echo "Verifying /sw.js..."
          HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" https://www.mbfdhub.com/sw.js)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: /sw.js returned $HTTP_CODE, expected 200"
            exit 1
          fi
          echo "✓ /sw.js returned 200"
          
          # Verify content type is JavaScript
          CONTENT_TYPE=$(curl -sL -I https://www.mbfdhub.com/sw.js | grep -i content-type | cut -d' ' -f2 | tr -d '\r')
          echo "Content-Type: $CONTENT_TYPE"
          if [[ "$CONTENT_TYPE" != *"javascript"* && "$CONTENT_TYPE" != *"text/plain"* ]]; then
            echo "WARNING: Unexpected Content-Type for service worker"
          fi

          echo "Verifying /daily/service-worker.js..."
          HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" https://www.mbfdhub.com/daily/service-worker.js)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: /daily/service-worker.js returned $HTTP_CODE, expected 200"
            exit 1
          fi
          echo "✓ /daily/service-worker.js returned 200"

          echo "Verifying /manifest.json..."
          HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" https://www.mbfdhub.com/manifest.json)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: /manifest.json returned $HTTP_CODE, expected 200"
            exit 1
          fi
          echo "✓ /manifest.json returned 200"
          
          echo "✓ Deployment and Verification complete!"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Deployment failed! Check the logs above for details."
          exit 1
